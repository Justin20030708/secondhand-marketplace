<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>二手市集 | 我的收藏</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <header class="site-header">
    <div class="header-inner">
      <a class="brand" href="index.html" aria-label="二手市集首頁">二手市集</a>
      <button id="nav-toggle" class="nav-toggle" type="button" aria-expanded="false" aria-controls="primary-nav" aria-label="開啟導覽選單">
        <span></span>
        <span></span>
        <span></span>
      </button>
      <nav id="primary-nav" class="primary-nav" aria-label="主要導覽">
        <ul class="nav-list">
          <li><a href="index.html">首頁</a></li>
          <li><a href="publish.html">發布商品</a></li>
          <li><a href="my-products.html">我的商品</a></li>
          <li><a class="is-current" href="favorites.html">我的收藏</a></li>
        </ul>
      </nav>
    </div>
  </header>

  <main class="container">
    <section class="list-section" aria-labelledby="favorites-title">
      <div class="title-row">
        <div class="title-block">
          <p class="section-kicker">My Favorites</p>
          <h1 id="favorites-title">我的收藏</h1>
        </div>
        <p class="count-text">共 <span id="favorites-count">0</span> 件商品</p>
      </div>

      <p id="favorites-user" class="count-text favorites-user-text">目前使用者：未設定</p>

      <div id="favorites-feedback" class="list-feedback" role="status" aria-live="polite" hidden>
        <p id="favorites-feedback-text" class="list-feedback-text">載入中...</p>
      </div>

      <p id="favorites-empty" class="empty-state" hidden>目前還沒有收藏任何商品喔</p>
      <div id="favorites-grid" class="product-grid" aria-live="polite"></div>
    </section>
  </main>

  <script src="favorites.js"></script>
</body>
</html>
